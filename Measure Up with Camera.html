<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Excavator Kinematics</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body, #root { height: 100%; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// --- Inline SVG Icon Components ---
const EyeIcon = ({ size = 14 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>
);
const EyeOffIcon = ({ size = 14 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
    <line x1="1" y1="1" x2="23" y2="23"/>
  </svg>
);
const RotateCcwIcon = ({ size = 14 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="1 4 1 10 7 10"/>
    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
  </svg>
);
const CircleDashedIcon = ({ size = 14 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10" strokeDasharray="4 4"/>
  </svg>
);
const RulerIcon = ({ size = 14 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/>
    <path d="m14.5 12.5 2-2"/><path d="m11.5 9.5 2-2"/><path d="m8.5 6.5 2-2"/><path d="m17.5 15.5 2-2"/>
  </svg>
);

// --- Constants & Geometry ---
const PIVOT_BOOM = { x: 20, y: 110 };
const PIVOT_STICK = { x: 420, y: -150 };
const PIVOT_BUCKET = { x: 30, y: 220 };

const RANGE_BOOM = { min: -60, max: 10 };
const RANGE_STICK = { min: 280, max: 360 };
const RANGE_BUCKET = { min: -80, max: 60 };

const MARKERS_BOOM = [
  { x: 50, y: -40 },
  { x: 270, y: -140 }
];
const MARKERS_STICK = [
  { x: 10, y: 40 },
  { x: 15, y: 140 }
];
const MARKERS_BUCKET = [
  { x: 0, y: 30 },
  { x: 50, y: 110 }
];

// --- Helpers ---
const getPolar = (x, y) => ({
  radius: Math.sqrt(x * x + y * y),
  angle: (Math.atan2(y, x) * 180) / Math.PI
});

const getDistance = (p1, p2) =>
  Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2)).toFixed(0);

// --- Components ---
const CheckerMarker = ({ x, y }) => (
  <g transform={`translate(${x}, ${y})`}>
    <circle r="8" fill="white" stroke="black" strokeWidth="2" />
    <path d="M -8 0 L 8 0 M 0 -8 L 0 8" stroke="black" strokeWidth="2" />
    <path d="M 0 0 L 8 0 A 8 8 0 0 1 0 8 Z" fill="black" />
    <path d="M 0 0 L -8 0 A 8 8 0 0 1 0 -8 Z" fill="black" />
  </g>
);

const HighlightCircle = ({ cx, cy, color, isVisible }) => {
  if (!isVisible) return null;
  return (
    <circle cx={cx} cy={cy} r="30" fill="none" stroke={color} strokeWidth="3" strokeDasharray="6 4" opacity="0.8" />
  );
};

const LabelMarker = ({ x, y, label, rotation = 0 }) => (
  <g transform={`translate(${x}, ${y}) rotate(${-rotation}) translate(0, -25)`}>
    <text y="6" textAnchor="middle" fontSize="20" fontWeight="900" stroke="white" strokeWidth="4" strokeLinejoin="round" style={{ pointerEvents: 'none', userSelect: 'none' }}>{label}</text>
    <text y="6" textAnchor="middle" fontSize="20" fontWeight="900" fill="#333" style={{ pointerEvents: 'none', userSelect: 'none' }}>{label}</text>
  </g>
);

const VectorLine = ({ p1, p2, color, isVisible }) => {
  if (!isVisible) return null;
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const length = 3000;
  const mag = Math.sqrt(dx * dx + dy * dy);
  const ux = dx / mag;
  const uy = dy / mag;
  return (
    <line
      x1={p1.x - ux * length} y1={p1.y - uy * length}
      x2={p1.x + ux * length} y2={p1.y + uy * length}
      stroke={color} strokeWidth="2" opacity="0.8"
    />
  );
};

const TrailArc = ({ marker, pivot, minAngle, maxAngle, color, isVisible }) => {
  if (!isVisible || minAngle === null || maxAngle === null || minAngle === maxAngle) return null;
  const radius = Math.sqrt(marker.x * marker.x + marker.y * marker.y);
  const baseAngleRad = Math.atan2(marker.y, marker.x);
  const baseAngleDeg = (baseAngleRad * 180) / Math.PI;
  const startDeg = baseAngleDeg + minAngle;
  const endDeg = baseAngleDeg + maxAngle;
  const startRad = (startDeg * Math.PI) / 180;
  const endRad = (endDeg * Math.PI) / 180;
  const x1 = pivot.x + radius * Math.cos(startRad);
  const y1 = pivot.y + radius * Math.sin(startRad);
  const x2 = pivot.x + radius * Math.cos(endRad);
  const y2 = pivot.y + radius * Math.sin(endRad);
  let diff = endDeg - startDeg;
  while (diff > 360) diff -= 360;
  while (diff < 0) diff += 360;
  const largeArcFlag = diff > 180 ? 1 : 0;
  return (
    <path
      d={`M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}`}
      fill="none" stroke={color} strokeWidth="5" strokeLinecap="round" opacity="0.6"
    />
  );
};

const PathCircle = ({ marker, pivot, color, isVisible }) => {
  if (!isVisible) return null;
  const { radius } = getPolar(marker.x, marker.y);
  return (
    <circle cx={pivot.x} cy={pivot.y} r={radius} fill="none" stroke={color} strokeWidth="3" strokeDasharray="12 8" opacity="0.8" />
  );
};

const DimensionLine = ({ p1, p2, offset = 50, color = "#666", isVisible }) => {
  if (!isVisible) return null;
  const angleRad = Math.atan2(p2.y - p1.y, p2.x - p1.x);
  const angleDeg = (angleRad * 180) / Math.PI;
  const perpX = -Math.sin(angleRad) * offset;
  const perpY = Math.cos(angleRad) * offset;
  const startX = p1.x + perpX;
  const startY = p1.y + perpY;
  const endX = p2.x + perpX;
  const endY = p2.y + perpY;
  const midX = (startX + endX) / 2;
  const midY = (startY + endY) / 2;
  const dist = getDistance(p1, p2);
  let textRot = angleDeg;
  if (textRot > 90 || textRot < -90) textRot += 180;
  return (
    <g style={{ pointerEvents: 'none' }}>
      <line x1={startX} y1={startY} x2={endX} y2={endY} stroke={color} strokeWidth="1.5" />
      <line x1={p1.x + perpX * 0.8} y1={p1.y + perpY * 0.8} x2={p1.x + perpX * 1.2} y2={p1.y + perpY * 1.2} stroke={color} strokeWidth="1.5" />
      <line x1={p2.x + perpX * 0.8} y1={p2.y + perpY * 0.8} x2={p2.x + perpX * 1.2} y2={p2.y + perpY * 1.2} stroke={color} strokeWidth="1.5" />
      <rect x={midX - 25} y={midY - 10} width="50" height="20" fill="rgba(255,255,255,0.8)" rx="4" transform={`rotate(${textRot}, ${midX}, ${midY})`} />
      <text x={midX} y={midY} fill={color} textAnchor="middle" dominantBaseline="middle" fontSize="14" fontWeight="bold" transform={`rotate(${textRot}, ${midX}, ${midY})`}>{dist}</text>
    </g>
  );
};

const ToggleButton = ({ active, onClick, label, icon: Icon = EyeIcon, colorClass = "gray" }) => {
  const activeClass = `bg-${colorClass}-50 text-${colorClass}-700 border-${colorClass}-300 ring-1 ring-${colorClass}-200`;
  const inactiveClass = `bg-white text-slate-500 border-gray-200 hover:bg-gray-50`;
  return (
    <button
      onClick={onClick}
      className={`flex items-center gap-1.5 px-2 py-1.5 text-[10px] sm:text-xs font-semibold rounded border transition-colors whitespace-nowrap ${active ? activeClass : inactiveClass}`}
      title={label}
    >
      {active ? <Icon size={14} /> : <EyeOffIcon size={14} />}
      {label}
    </button>
  );
};

function App() {
  const [boomAngle, setBoomAngle] = useState(-30);
  const [stickAngle, setStickAngle] = useState(300);
  const [bucketAngle, setBucketAngle] = useState(-20);
  const [activeControl, setActiveControl] = useState(null);
  const [dragBounds, setDragBounds] = useState({ min: null, max: null });

  const [showBoomVec, setShowBoomVec] = useState(false);
  const [showStickVec, setShowStickVec] = useState(false);
  const [showBucketVec, setShowBucketVec] = useState(false);
  const [showBoomPath, setShowBoomPath] = useState(false);
  const [showStickPath, setShowStickPath] = useState(false);
  const [showBucketPath, setShowBucketPath] = useState(false);
  const [showBoomDim, setShowBoomDim] = useState(false);
  const [showStickDim, setShowStickDim] = useState(false);
  const [showBucketDim, setShowBucketDim] = useState(false);

  const handleReset = () => {
    setBoomAngle(-30);
    setStickAngle(300);
    setBucketAngle(-20);
    setShowBoomVec(false);
    setShowStickVec(false);
    setShowBucketVec(false);
    setShowBoomPath(false);
    setShowStickPath(false);
    setShowBucketPath(false);
    setShowBoomDim(false);
    setShowStickDim(false);
    setShowBucketDim(false);
    setActiveControl(null);
    setDragBounds({ min: null, max: null });
  };

  return (
    <div className="flex flex-col h-screen bg-gray-50 text-slate-800 font-sans">
      {/* Header */}
      <header className="bg-white border-b p-3 flex flex-col xl:flex-row justify-between items-center shadow-sm z-10 gap-3">
        <div>
          <h1 className="text-lg font-bold text-slate-900">Excavator Kinematics</h1>
        </div>
        <div className="flex flex-wrap gap-2 items-center justify-center">
          {/* Vector Toggles */}
          <div className="flex items-center gap-1 bg-gray-50 p-1 rounded-lg border border-gray-100">
            <span className="text-[10px] font-bold text-slate-400 px-2 uppercase tracking-wider">Vectors</span>
            <ToggleButton active={showBoomVec} onClick={() => setShowBoomVec(!showBoomVec)} label="Boom" colorClass="green" />
            <ToggleButton active={showStickVec} onClick={() => setShowStickVec(!showStickVec)} label="Stick" colorClass="red" />
            <ToggleButton active={showBucketVec} onClick={() => setShowBucketVec(!showBucketVec)} label="Bucket" colorClass="blue" />
          </div>
          {/* Path Toggles */}
          <div className="flex items-center gap-1 bg-gray-50 p-1 rounded-lg border border-gray-100">
            <span className="text-[10px] font-bold text-slate-400 px-2 uppercase tracking-wider">Paths</span>
            <ToggleButton active={showBoomPath} onClick={() => setShowBoomPath(!showBoomPath)} label="Boom" icon={CircleDashedIcon} colorClass="green" />
            <ToggleButton active={showStickPath} onClick={() => setShowStickPath(!showStickPath)} label="Stick" icon={CircleDashedIcon} colorClass="red" />
            <ToggleButton active={showBucketPath} onClick={() => setShowBucketPath(!showBucketPath)} label="Bucket" icon={CircleDashedIcon} colorClass="blue" />
          </div>
          {/* Dimension Toggles */}
          <div className="flex items-center gap-1 bg-gray-50 p-1 rounded-lg border border-gray-100">
            <span className="text-[10px] font-bold text-slate-400 px-2 uppercase tracking-wider">Dims</span>
            <ToggleButton active={showBoomDim} onClick={() => setShowBoomDim(!showBoomDim)} label="Boom" icon={RulerIcon} colorClass="slate" />
            <ToggleButton active={showStickDim} onClick={() => setShowStickDim(!showStickDim)} label="Stick" icon={RulerIcon} colorClass="slate" />
            <ToggleButton active={showBucketDim} onClick={() => setShowBucketDim(!showBucketDim)} label="Bucket" icon={RulerIcon} colorClass="slate" />
          </div>
          <div className="w-px h-6 bg-gray-200 mx-1 hidden sm:block"></div>
          <button
            onClick={handleReset}
            className="flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-slate-600 bg-gray-100 hover:bg-gray-200 rounded border border-transparent transition-colors"
          >
            <RotateCcwIcon size={14} /> Reset
          </button>
        </div>
      </header>

      {/* Main Canvas Area */}
      <main className="flex-grow relative overflow-hidden bg-slate-100 flex items-center justify-center select-none">
        <div className="absolute inset-0 opacity-10"
          style={{
            backgroundImage: 'linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px)',
            backgroundSize: '40px 40px'
          }}>
        </div>

        <svg viewBox="-400 -500 1500 1100" className="w-full h-full max-w-6xl max-h-[85vh] drop-shadow-2xl" preserveAspectRatio="xMidYMid meet">
          <defs>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="2" dy="4" stdDeviation="3" floodOpacity="0.3" />
            </filter>
          </defs>

          {/* GROUND */}
          <line x1="-1500" y1="230" x2="2500" y2="230" stroke="#333" strokeWidth="4" strokeLinecap="round" />

          {/* === BASE & CABIN (Static) === */}
          <g transform="translate(0, 0)">
            {/* Tracks */}
            <g transform="translate(-100, 160)">
              <path d="M -60 0 L 160 0 A 30 30 0 0 1 190 30 L 190 40 A 30 30 0 0 1 160 70 L -60 70 A 30 30 0 0 1 -90 40 L -90 30 A 30 30 0 0 1 -60 0 Z" fill="#fff" stroke="#000" strokeWidth="3" />
              <circle cx="-50" cy="35" r="20" fill="none" stroke="#000" strokeWidth="2" />
              <circle cx="150" cy="35" r="20" fill="none" stroke="#000" strokeWidth="2" />
              <circle cx="0" cy="55" r="8" fill="none" stroke="#000" strokeWidth="1" />
              <circle cx="50" cy="55" r="8" fill="none" stroke="#000" strokeWidth="1" />
              <circle cx="100" cy="55" r="8" fill="none" stroke="#000" strokeWidth="1" />
            </g>

            {/* Cabin Body */}
            <g transform="translate(-80, 0)">
              <path d="M 0 0 L 0 -130 L 100 -130 L 120 -60 L 120 160 L -100 160 L -100 0 Z" fill="#fff" stroke="#000" strokeWidth="3" />
              <rect x="-180" y="20" width="100" height="100" fill="#fff" stroke="#000" strokeWidth="3" rx="10" />
              <rect x="-170" y="30" width="80" height="30" fill="none" stroke="#000" strokeWidth="1" />
              <path d="M 10 -120 L 90 -120 L 105 -60 L 105 50 L 10 50 Z" fill="#eef" stroke="#000" strokeWidth="2" />
              <path d="M 40 40 L 40 0 C 40 -20 60 -20 60 0" fill="none" stroke="#000" strokeWidth="2" />
              <path d="M 80 70 L 120 70 L 120 130 L 80 130 Z" fill="#e2e8f0" stroke="#000" strokeWidth="2" />
            </g>
          </g>

          {/* === BOOM GROUP === */}
          <g transform={`translate(${PIVOT_BOOM.x}, ${PIVOT_BOOM.y}) rotate(${boomAngle})`}>
            <path
              d={`M 15 -20 L 165 -195 L ${PIVOT_STICK.x - 15} ${PIVOT_STICK.y - 20} L ${PIVOT_STICK.x + 25} ${PIVOT_STICK.y} L ${PIVOT_STICK.x - 5} ${PIVOT_STICK.y + 25} Q 180 -60 15 20 A 25 25 0 1 1 15 -20 Z`}
              fill="#fff" stroke="#000" strokeWidth="3" strokeLinejoin="round"
            />
            <circle cx="0" cy="0" r="12" fill="#ddd" stroke="#000" strokeWidth="2" />
            <circle cx="0" cy="0" r="6" fill="#999" />

            {/* === STICK GROUP === */}
            <g transform={`translate(${PIVOT_STICK.x}, ${PIVOT_STICK.y}) rotate(${stickAngle})`}>
              <path
                d={`M -20 -30 L 40 -30 L ${PIVOT_BUCKET.x + 20} ${PIVOT_BUCKET.y} L ${PIVOT_BUCKET.x - 20} ${PIVOT_BUCKET.y} Z`}
                fill="#fff" stroke="#000" strokeWidth="3"
              />
              <circle cx="0" cy="0" r="8" fill="#ddd" stroke="#000" strokeWidth="2" />

              {/* === BUCKET GROUP === */}
              <g transform={`translate(${PIVOT_BUCKET.x}, ${PIVOT_BUCKET.y}) rotate(${bucketAngle})`}>
                <path d="M -15 -15 Q 60 0 50 110 Q -10 60 -15 -15 Z" fill="#fff" stroke="#000" strokeWidth="3" />
                <path d="M 50 110 L 45 100 L 55 100 Z" fill="#000" />
                <circle cx="0" cy="0" r="6" fill="#ddd" stroke="#000" strokeWidth="2" />

                {/* BUCKET OVERLAYS */}
                <VectorLine p1={MARKERS_BUCKET[0]} p2={MARKERS_BUCKET[1]} color="#3b82f6" isVisible={showBucketVec} />
                {showBucketVec && <CheckerMarker x={MARKERS_BUCKET[0].x} y={MARKERS_BUCKET[0].y} />}
                <CheckerMarker x={MARKERS_BUCKET[1].x} y={MARKERS_BUCKET[1].y} />
                <DimensionLine p1={{ x: 0, y: 0 }} p2={MARKERS_BUCKET[1]} offset={60} isVisible={showBucketDim} color="#475569" />
                <LabelMarker x={MARKERS_BUCKET[1].x} y={MARKERS_BUCKET[1].y} label="j" rotation={boomAngle + stickAngle + bucketAngle} />
              </g>

              {/* STICK OVERLAYS */}
              <HighlightCircle cx={PIVOT_BUCKET.x} cy={PIVOT_BUCKET.y} color="#3b82f6" isVisible={activeControl === 'bucket'} />
              <PathCircle marker={MARKERS_BUCKET[1]} pivot={PIVOT_BUCKET} color="#3b82f6" isVisible={showBucketPath} />
              <TrailArc marker={MARKERS_BUCKET[1]} pivot={PIVOT_BUCKET} minAngle={dragBounds.min} maxAngle={dragBounds.max} color="#3b82f6" isVisible={activeControl === 'bucket'} />
              <VectorLine p1={MARKERS_STICK[0]} p2={MARKERS_STICK[1]} color="#ef4444" isVisible={showStickVec} />
              {showStickVec && <CheckerMarker x={MARKERS_STICK[0].x} y={MARKERS_STICK[0].y} />}
              <CheckerMarker x={MARKERS_STICK[1].x} y={MARKERS_STICK[1].y} />
              <DimensionLine p1={{ x: 0, y: 0 }} p2={PIVOT_BUCKET} offset={-80} isVisible={showStickDim} color="#475569" />
              <LabelMarker x={PIVOT_BUCKET.x} y={PIVOT_BUCKET.y} label="g" rotation={boomAngle + stickAngle} />
            </g>

            {/* BOOM OVERLAYS */}
            <HighlightCircle cx={PIVOT_STICK.x} cy={PIVOT_STICK.y} color="#ef4444" isVisible={activeControl === 'stick'} />
            <PathCircle marker={MARKERS_STICK[1]} pivot={PIVOT_STICK} color="#ef4444" isVisible={showStickPath} />
            <TrailArc marker={MARKERS_STICK[1]} pivot={PIVOT_STICK} minAngle={dragBounds.min} maxAngle={dragBounds.max} color="#ef4444" isVisible={activeControl === 'stick'} />
            <VectorLine p1={MARKERS_BOOM[0]} p2={MARKERS_BOOM[1]} color="#22c55e" isVisible={showBoomVec} />
            <CheckerMarker x={MARKERS_BOOM[0].x} y={MARKERS_BOOM[0].y} />
            <CheckerMarker x={MARKERS_BOOM[1].x} y={MARKERS_BOOM[1].y} />
            <DimensionLine p1={MARKERS_BOOM[0]} p2={MARKERS_BOOM[1]} offset={0} isVisible={true} color="black" />
            <DimensionLine p1={{ x: 0, y: 0 }} p2={PIVOT_STICK} offset={100} isVisible={showBoomDim} color="#475569" />
            <LabelMarker x={PIVOT_STICK.x} y={PIVOT_STICK.y} label="s" rotation={boomAngle} />
          </g>

          {/* BASE OVERLAYS */}
          <PathCircle marker={MARKERS_BOOM[1]} pivot={PIVOT_BOOM} color="#22c55e" isVisible={showBoomPath} />
          <TrailArc marker={MARKERS_BOOM[1]} pivot={PIVOT_BOOM} minAngle={dragBounds.min} maxAngle={dragBounds.max} color="#22c55e" isVisible={activeControl === 'boom'} />
          <HighlightCircle cx={PIVOT_BOOM.x} cy={PIVOT_BOOM.y} color="#22c55e" isVisible={activeControl === 'boom'} />
          <LabelMarker x={PIVOT_BOOM.x} y={PIVOT_BOOM.y} label="a" rotation={0} />
        </svg>
      </main>

      {/* Control Panel */}
      <footer className="bg-white border-t p-6 shadow-lg z-20">
        <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
          {/* Boom Control */}
          <div className="relative group">
            <label className="block text-xs font-semibold text-green-600 uppercase tracking-wide mb-2 flex justify-between">
              <span>Boom Angle</span>
              <span className="text-slate-900">{boomAngle}°</span>
            </label>
            <input
              type="range"
              min={RANGE_BOOM.min} max={RANGE_BOOM.max}
              value={boomAngle}
              onMouseDown={() => { setActiveControl('boom'); setDragBounds({ min: boomAngle, max: boomAngle }); setShowBoomPath(false); }}
              onMouseUp={() => { setActiveControl(null); setShowBoomPath(true); }}
              onTouchStart={() => { setActiveControl('boom'); setDragBounds({ min: boomAngle, max: boomAngle }); setShowBoomPath(false); }}
              onTouchEnd={() => { setActiveControl(null); setShowBoomPath(true); }}
              onChange={(e) => { const val = Number(e.target.value); setBoomAngle(val); setDragBounds(prev => ({ min: Math.min(prev.min !== null ? prev.min : val, val), max: Math.max(prev.max !== null ? prev.max : val, val) })); }}
              className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600 hover:accent-green-700 focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-offset-2 transition-all"
            />
          </div>

          {/* Stick Control */}
          <div className="relative group">
            <label className="block text-xs font-semibold text-red-600 uppercase tracking-wide mb-2 flex justify-between">
              <span>Stick Angle</span>
              <span className="text-slate-900">{stickAngle}°</span>
            </label>
            <input
              type="range"
              min={RANGE_STICK.min} max={RANGE_STICK.max}
              value={stickAngle}
              onMouseDown={() => { setActiveControl('stick'); setDragBounds({ min: stickAngle, max: stickAngle }); setShowStickPath(false); setShowBoomDim(true); }}
              onMouseUp={() => { setActiveControl(null); setShowStickPath(true); }}
              onTouchStart={() => { setActiveControl('stick'); setDragBounds({ min: stickAngle, max: stickAngle }); setShowStickPath(false); setShowBoomDim(true); }}
              onTouchEnd={() => { setActiveControl(null); setShowStickPath(true); }}
              onChange={(e) => { const val = Number(e.target.value); setStickAngle(val); setDragBounds(prev => ({ min: Math.min(prev.min !== null ? prev.min : val, val), max: Math.max(prev.max !== null ? prev.max : val, val) })); }}
              className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-600 hover:accent-red-700 focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2 transition-all"
            />
          </div>

          {/* Bucket Control */}
          <div className="relative group">
            <label className="block text-xs font-semibold text-blue-600 uppercase tracking-wide mb-2 flex justify-between">
              <span>Bucket Angle</span>
              <span className="text-slate-900">{bucketAngle}°</span>
            </label>
            <input
              type="range"
              min={RANGE_BUCKET.min} max={RANGE_BUCKET.max}
              value={bucketAngle}
              onMouseDown={() => { setActiveControl('bucket'); setDragBounds({ min: bucketAngle, max: bucketAngle }); setShowBucketPath(false); setShowStickDim(true); setShowBucketDim(true); }}
              onMouseUp={() => { setActiveControl(null); setShowBucketPath(true); }}
              onTouchStart={() => { setActiveControl('bucket'); setDragBounds({ min: bucketAngle, max: bucketAngle }); setShowBucketPath(false); setShowStickDim(true); setShowBucketDim(true); }}
              onTouchEnd={() => { setActiveControl(null); setShowBucketPath(true); }}
              onChange={(e) => { const val = Number(e.target.value); setBucketAngle(val); setDragBounds(prev => ({ min: Math.min(prev.min !== null ? prev.min : val, val), max: Math.max(prev.max !== null ? prev.max : val, val) })); }}
              className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600 hover:accent-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 transition-all"
            />
          </div>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
